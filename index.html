<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Notes App</h2>
        <div class="form">
            <input type="text" id="titleNote" placeholder="Title">
            <textarea name="content" id="contentNote"></textarea>
            <button id="addBtn">Add Note</button>
        </div>
            <input type="search" id="searchBox" placeholder="Seach notes...">
            <ul id="notesList"></ul>
        </div>
    
    <script src="script.js"></script>
</body>

</html>
